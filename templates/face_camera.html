<!DOCTYPE html>
<html>
<head>
    <title>Face Camera</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

<style>

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:350px;
}

/* ADD THIS */
.modal-content h3,
.modal-content p{
color:black;
font-weight:bold;
}

.modal-btn{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>📸 Face Verification</h1>
<p class="subtitle">Look at the camera and blink once</p>

<video id="video"
autoplay
playsinline
style="width:480px;
height:360px;
border-radius:10px;
border:3px solid #2ecc71;
margin-top:20px;">
</video>

<div id="statusText"
style="margin-top:15px;
font-weight:bold;
color:#2ecc71;">

Initializing camera...

</div>

</div>

<!-- FAIL MODAL -->

<div id="faceFailModal" class="modal">

<div class="modal-content">

<h3>❌ Verification Failed</h3>

<p id="faceFailMessage">
Face verification failed after maximum attempts.
</p>

<button class="modal-btn"
style="background:#dc3545;color:white;"
onclick="goHome()">

Back to Home

</button>

</div>
</div>


<script>

const video = document.getElementById("video");
const statusText = document.getElementById("statusText");

let verifying = false;
let locked = false;

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {

video.srcObject = stream;

statusText.innerText = "Camera ready...";

startVerification();

})
.catch(() => {

statusText.innerText = "Camera access denied.";

});


async function startVerification(){

while(true){

if(locked) break;

if(!video.videoWidth){

await new Promise(r => setTimeout(r,200));
continue;

}

if(verifying) continue;

verifying = true;

statusText.innerText = "Verifying...";

const canvas = document.createElement("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(video,0,0);

const imageData = canvas.toDataURL("image/jpeg");

try{

const response = await fetch("/api/verify_face",{

method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ image:imageData })

});

const data = await response.json();


if(data.status === true){

statusText.innerText="Face Verified ✅";

window.location.href="/otp";

break;

}

else if(data.status === "LOCKED"){

locked = true;

document.getElementById("faceFailMessage").innerText = data.message;

document.getElementById("faceFailModal").style.display="flex";

break;

}

else{

statusText.innerText = data.message;

}

}

catch(error){

statusText.innerText="Verification error.";

}

verifying=false;

await new Promise(r => setTimeout(r,700));

}

}


function goHome(){

window.location.href="/";

}

</script>

</body>
</html>
