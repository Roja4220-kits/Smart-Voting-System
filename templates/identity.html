<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity Verification</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">

        <h1>🆔 Identity Verification</h1>

        <p class="subtitle">
            Please enter your registered Voter ID to proceed
        </p>

        <div class="form-box">
            <form method="POST">

                <input type="text"
                       name="voter_id"
                       placeholder="Enter Voter ID"
                       required>

                <br><br>

                <button type="submit" class="primary-btn">
                    Verify Identity
                </button>

            </form>
        </div>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}
        <form action="{{ url_for('index') }}">
            <button type="submit" class="secondary-btn">
                ⬅ Back to Home
            </button>
        </form>


    </div>

</body>
</html>
