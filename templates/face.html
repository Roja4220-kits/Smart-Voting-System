<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Verification</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .footer-bar {
            margin-top: 40px;
            padding: 15px;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            border-radius: 0 0 10px 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📸 Face Verification</h1>

    <p class="subtitle">
        Secure Biometric Authentication with Liveness Detection
    </p>

    <!-- Instructions -->
    <div class="info-box" style="margin-top:20px;">
        <ul style="text-align:left;">
            <li>✔ Ensure good lighting</li>
            <li>✔ Remove glasses (if possible)</li>
            <li>✔ Look straight into the camera</li>
            <li>✔ Stay still during verification</li>
            <li>✔ Make sure only one face is visible</li>
        </ul>
    </div>

    <!-- Buttons -->
    <div style="margin-top:30px;
                display:flex;
                justify-content:center;
                gap:20px;
                flex-wrap:wrap;">

        <!-- Back -->
        <form action="{{ url_for('details') }}" method="GET">
            <button type="submit" class="secondary-btn">
                ⬅ Back
            </button>
        </form>

        <!-- Start Verification -->
        <form action="{{ url_for('face_camera') }}" method="GET">
            <button type="submit" class="primary-btn">
                Start Face Verification
            </button>
        </form>

    </div>

</div>

</body>
</html>
